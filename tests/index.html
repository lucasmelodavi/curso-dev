<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Jogo de Tempo</title>
</head>
<body>

<script>
// Criar elementos
const titulo = document.createElement("h1");
titulo.innerText = "Clique antes do tempo acabar!";
document.body.appendChild(titulo);

const tempoTexto = document.createElement("p");
tempoTexto.innerText = "Tempo restante: 5";
document.body.appendChild(tempoTexto);

const botao = document.createElement("button");
botao.innerText = "Clique aqui!";
document.body.appendChild(botao);

// Variáveis
let tempo = 5;
let jogoAtivo = true;

// Contador
const contador = setInterval(() => {
  tempo--;
  tempoTexto.innerText = "Tempo restante: " + tempo;

  if (tempo <= 0) {
    clearInterval(contador);
    if (jogoAtivo) {
      titulo.innerText = "Você perdeu 😢";
      botao.disabled = true;
    }
  }
}, 1000);

// Clique
botao.onclick = () => {
  if (jogoAtivo) {
    jogoAtivo = false;
    clearInterval(contador);
    titulo.innerText = "Você ganhou 🎉";
    botao.disabled = true;
  }
};
</script>

</body>
</html>
