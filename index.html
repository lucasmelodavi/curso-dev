<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Jogo</title>
</head>
<body>

<h1>Clique rápido!</h1>
<button onclick="clicar()">CLIQUE</button>
<p id="pontos">0</p>

<script>
let pontos = 0;

function clicar() {
  pontos++;
  document.getElementById("pontos").innerText = pontos;
}
</script>

</body>
</html>
