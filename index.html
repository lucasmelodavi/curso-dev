<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Meu Jogo</title>
</head>
<body>

<h1>Clique rápido!</h1>
<p>Pontos: <span id="pontos">0</span></p>
<button onclick="clicar()">CLIQUE</button>

<script>
let pontos = 0;

function clicar() {
  pontos++;
  document.getElementById("pontos").innerText = pontos;
}
</script>

</body>
</html>
