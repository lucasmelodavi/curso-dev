<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Jogo de Recorde</title>
</head>
<body>

<h1 id="titulo">Clique o máximo que puder!</h1>
<p>Tempo: <span id="tempo">10</span></p>
<p>Pontos: <span id="pontos">0</span></p>
<p>Recorde: <span id="recorde">0</span></p>
<button id="botao">CLIQUE!</button>

<script>
let tempo = 10;
let pontos = 0;
let recorde = localStorage.getItem("recorde") || 0;

document.getElementById("recorde").innerText = recorde;

const contador = setInterval(() => {
  tempo--;
  document.getElementById("tempo").innerText = tempo;

  if (tempo <= 0) {
    clearInterval(contador);
    document.getElementById("botao").disabled = true;

    if (pontos > recorde) {
      localStorage.setItem("recorde", pontos);
      document.getElementById("titulo").innerText = "NOVO RECORDE! 🎉";
    } else {
      document.getElementById("titulo").innerText = "Fim de jogo!";
    }
  }
}, 1000);

document.getElementById("botao").onclick = () => {
  pontos++;
  document.getElementById("pontos").innerText = pontos;
};
</script>

</body>
</html>
