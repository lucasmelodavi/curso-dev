<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo do Número</title>

  <style>
    body {
      background: #121212;
      color: white;
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    input, button {
      padding: 10px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      margin: 5px;
    }

    button {
      background: crimson;
      color: white;
      cursor: pointer;
    }

    #resultado {
      margin-top: 20px;
      font-size: 24px;
    }
  </style>
</head>

<body>

  <h1>🎲 Jogo do Número</h1>

  <p>Digite um número:</p>

  <input type="number" id="numero">

  <button onclick="jogar()">Jogar</button>

  <div id="resultado"></div>

  <script>
    function jogar() {

      // pega o número digitado
      let numero = Number(document.getElementById("numero").value);

      // máquina soma +1
      let maquina = numero + 1;

      // mostra resultado
      document.getElementById("resultado").innerHTML =
      `
      Você escolheu: ${numero} <br><br>
      🤖 Máquina escolheu: ${maquina} <br><br>
       Você perdeu HAHAHA !
      `;
    }
  </script>

</body>
</html>
